name: E2E x64

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fake-flutter:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE/.tmp" || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Install Dart
        uses: dart-lang/setup-dart@v1

      - name: Bootstrap Dart SDK sources
        run: |
          mkdir -p vendor/flutter/engine/src/flutter/third_party
          git clone --depth 1 --branch stable https://github.com/lollipopkit/dartsdk.git \
            vendor/flutter/engine/src/flutter/third_party/dart

      - name: Kernel compile-from-plan drill
        run: |
          DART_BIN="$(command -v dart)" make test-kernel-compile

      - name: Build CLI
        # The e2e exercises both backends incl. snapshot_replace, so build with
        # default features. Store-config (no snapshot_replace) compile/test is
        # covered by the Rust workflow's --no-default-features jobs.
        run: cargo build -p fcb

      - name: Build server
        working-directory: server
        run: go build -o ../target/debug/fcb_server .

      - name: Run fake Flutter e2e
        run: |
          FCB_BIN="$PWD/target/debug/fcb" \
          SERVER_BIN="$PWD/target/debug/fcb_server" \
          DART_BIN="$(command -v dart)" \
          bash tests/e2e/test_e2e.sh
