name: Rust

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Clean workspace
        run: sudo rm -rf "$GITHUB_WORKSPACE/.tmp" || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --check

      # Default config exercises the snapshot_replace backend paths/tests.
      - name: Clippy (default)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test (default)
        run: cargo test --workspace

      # Store config (ADR-#3): snapshot_replace excluded; must compile + pass clean.
      - name: Clippy (store build, no snapshot_replace)
        run: cargo clippy --workspace --no-default-features --all-targets -- -D warnings

      - name: Test (store build, no snapshot_replace)
        run: cargo test --workspace --no-default-features

      - name: Build store binary (no snapshot_replace)
        run: cargo build --workspace --no-default-features

      - name: Crash rollback drill
        run: make test-crash-rollback
