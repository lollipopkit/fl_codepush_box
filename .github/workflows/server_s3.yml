name: Server S3 Storage

on:
  schedule:
    - cron: "11 19 * * *"
  workflow_dispatch:

jobs:
  minio-drill:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Verify Docker
        run: docker version

      - name: Run S3 storage drill
        run: make test-s3-storage

      - name: Upload drill logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: s3-storage-drill-logs
          path: /tmp/fcb-s3-drill.*
          if-no-files-found: ignore
